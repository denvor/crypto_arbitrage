<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>策略回测 - crypto Arbitrage</title>
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Arbitrage">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icon-192.png') }}">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #222633;
      --border: #2a2e3a;
      --text: #e4e4e7;
      --text-muted: #8b8fa3;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --green: #22c55e;
      --green-bg: rgba(34,197,94,0.1);
      --red: #ef4444;
      --red-bg: rgba(239,68,68,0.1);
      --orange: #f59e0b;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Nav */
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem; border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .nav-brand {
      font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .nav-links { display: flex; gap: 0.5rem; }
    .nav-links a {
      color: var(--text-muted); text-decoration: none; padding: 0.5rem 1rem;
      border-radius: 8px; font-size: 0.9rem; transition: all 0.15s;
    }
    .nav-links a:hover { color: var(--text); background: var(--surface-hover); }
    .nav-links a.active { color: var(--accent); background: rgba(99,102,241,0.1); }

    /* Page header */
    .page-header {
      max-width: 1100px; margin: 2rem auto 0; padding: 0 1rem;
    }
    .page-header h1 { font-size: 1.75rem; font-weight: 800; letter-spacing: -0.02em; }

    /* Form card */
    .form-card {
      max-width: 1100px; margin: 1.5rem auto; padding: 0 1rem;
    }
    .form-inner {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.75rem;
    }
    .form-row { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.25rem; }
    .form-row:last-child { margin-bottom: 0; }
    .form-group { display: flex; flex-direction: column; gap: 0.35rem; }
    .form-group label { font-size: 0.78rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .form-group input[type="date"],
    .form-group input[type="number"],
    .form-group select {
      padding: 0.55rem 0.75rem; border: 1px solid var(--border);
      border-radius: 8px; font-size: 0.9rem; background: var(--bg);
      color: var(--text); transition: border-color 0.15s;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none; border-color: var(--accent);
    }

    .pair-checks { display: flex; flex-wrap: wrap; gap: 0.75rem; }
    .pair-checks label {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.88rem; font-weight: 500; cursor: pointer;
      padding: 0.4rem 0.75rem; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg);
      transition: all 0.15s;
    }
    .pair-checks label:hover { border-color: var(--accent); }
    .pair-range { color: var(--text-muted); font-size: 0.75rem; }

    /* Run button */
    .btn-run {
      padding: 0.65rem 2.5rem; background: var(--accent); color: white;
      border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-run:hover:not(:disabled) { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 15px rgba(99,102,241,0.3); }
    .btn-run:disabled { background: var(--surface-hover); color: var(--text-muted); cursor: not-allowed; transform: none; box-shadow: none; }

    /* Progress */
    .progress-bar {
      display: none; max-width: 1100px; margin: 1.5rem auto; padding: 0 1rem;
    }
    .progress-bar.active { display: block; }
    .progress-track {
      height: 4px; background: var(--border); border-radius: 4px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-hover));
      border-radius: 4px; width: 60%;
      animation: shimmer 1.2s ease-in-out infinite;
    }
    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(250%); }
    }
    .progress-text { font-size: 0.82rem; color: var(--text-muted); margin-top: 0.5rem; }

    /* Error */
    .error-msg { max-width: 1100px; margin: 1rem auto; padding: 0 1rem; }
    .error-box {
      padding: 1rem 1.25rem; border-radius: 10px;
      background: var(--red-bg); border: 1px solid rgba(239,68,68,0.2);
      color: var(--red); font-size: 0.9rem;
      display: flex; align-items: center; gap: 0.5rem;
    }

    /* Summary */
    .summary-card {
      max-width: 1100px; margin: 1.5rem auto; padding: 0 1rem;
      display: none;
    }
    .summary-card.active { display: block; }
    .summary-inner {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.5rem;
    }
    .summary-inner h2 {
      font-size: 1rem; font-weight: 700; margin-bottom: 1rem;
      padding-bottom: 0.75rem; border-bottom: 1px solid var(--border);
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      padding: 0.65rem 0.75rem; text-align: right; font-size: 0.75rem;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--text-muted); background: rgba(255,255,255,0.02);
    }
    th:first-child { text-align: left; }
    td {
      padding: 0.7rem 0.75rem; text-align: right; font-size: 0.88rem;
      font-variant-numeric: tabular-nums; border-bottom: 1px solid var(--border);
    }
    td:first-child { text-align: left; font-weight: 600; }
    td:last-child { border-bottom: none; }
    .td-green { color: var(--green); }
    .td-red { color: var(--red); }

    /* Detail */
    .detail-card {
      max-width: 1100px; margin: 1.5rem auto; padding: 0 1rem;
      display: none;
    }
    .detail-card.active { display: block; }
    .detail-inner {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.5rem;
    }
    .detail-inner h2 {
      font-size: 1rem; font-weight: 700; margin-bottom: 1rem;
      padding-bottom: 0.75rem; border-bottom: 1px solid var(--border);
    }

    .pair-section { margin-bottom: 2rem; }
    .pair-section:last-child { margin-bottom: 0; }
    .pair-title {
      font-size: 0.95rem; font-weight: 700; margin-bottom: 0.75rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .pair-dot { width: 8px; height: 8px; border-radius: 50%; }
    .pair-dot.btc { background: #f7931a; }
    .pair-dot.eth { background: #627eea; }

    .pair-stats {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 0.6rem; margin-bottom: 1rem; padding: 0.85rem;
      background: rgba(255,255,255,0.02); border-radius: 8px;
      font-size: 0.82rem;
    }
    .pair-stats dt { color: var(--text-muted); font-weight: 500; }
    .pair-stats dd { font-weight: 700; font-variant-numeric: tabular-nums; margin-bottom: 0.2rem; }

    .toggle-btn {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      padding: 0.35rem 0.9rem; cursor: pointer; font-size: 0.82rem;
      color: var(--accent); font-weight: 600; transition: all 0.15s;
      margin-bottom: 0.75rem;
    }
    .toggle-btn:hover { background: var(--surface-hover); border-color: var(--accent); }

    .detail-table { display: none; width: 100%; border-collapse: collapse; }
    .detail-table.active { display: table; }
    .detail-table th {
      font-size: 0.72rem; padding: 0.5rem 0.4rem; position: sticky;
      top: 0; background: var(--surface);
    }
    .detail-table td {
      font-size: 0.8rem; padding: 0.45rem 0.4rem;
      font-variant-numeric: tabular-nums;
    }

    .yield-tag {
      display: inline-block; font-size: 0.65rem; padding: 0.1rem 0.4rem;
      border-radius: 4px; background: rgba(34,197,94,0.15); color: var(--green);
      font-weight: 700; vertical-align: middle;
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-brand">Arbitrage</div>
    <div class="nav-links">
      <a href="{{ url_for('index') }}">首页</a>
      <a href="{{ url_for('maintenance') }}">数据维护</a>
      <a href="{{ url_for('backtest') }}" class="active">回测</a>
    </div>
  </nav>

  <div class="page-header">
    <h1>策略回测</h1>
  </div>

  <!-- Form -->
  <div class="form-card">
    <div class="form-inner">
      <form id="backtest-form">
        <div class="form-row">
          <div class="form-group" style="flex:1; min-width: 280px;">
            <label>交易对</label>
            <div class="pair-checks" id="pair-checks">
              {% for key, name in pairs.items() %}
              <label>
                <input type="checkbox" name="pair" value="{{ key }}" {% if key == 'btcusdt' %}checked{% endif %}>
                <span>{{ name }}</span>
                <span class="pair-range">({{ pair_ranges[name].min }} ~ {{ pair_ranges[name].max }})</span>
              </label>
              {% endfor %}
            </div>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>开始日期</label>
            <input type="date" id="start" name="start" value="2024-01-01" required>
          </div>
          <div class="form-group">
            <label>结束日期</label>
            <input type="date" id="end" name="end" value="2025-01-01" required>
          </div>
          <div class="form-group">
            <label>总资金 (USDT)</label>
            <input type="number" id="capital" name="capital" value="10000" min="100" step="100">
          </div>
          <div class="form-group">
            <label>杠杆倍数</label>
            <input type="number" id="leverage" name="leverage" value="1" min="1" max="20" step="0.5">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>合约手续费率</label>
            <input type="number" id="futures_fee" name="futures_fee" value="0.0002" step="0.0001" min="0">
          </div>
          <div class="form-group">
            <label>现货手续费率</label>
            <input type="number" id="spot_fee" name="spot_fee" value="0.001" step="0.0001" min="0">
          </div>
          <div class="form-group">
            <label>滑点率</label>
            <input type="number" id="slippage" name="slippage" value="0" step="0.00001" min="0">
          </div>
          <div class="form-group" style="justify-content:flex-end">
            <label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer;">
              <select id="yield_asset" name="yield_asset" style="padding:0.2rem 0.4rem;border:1px solid #d0d5dd;border-radius:4px;font-size:0.85rem;">
                <option value="none">不使用收益型资产</option>
                <option value="bfusd">BFUSD</option>
                <option value="rwusd">RWUSD</option>
                <option value="ldusdt">LDUSDT</option>
              </select>
              <span>收益型保证金资产</span>
            </label>
          </div>
        </div>
        <div class="form-row">
          <button type="submit" class="btn-run" id="btn-run">开始回测</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-bar" id="progress">
    <div class="progress-track"><div class="progress-fill"></div></div>
    <div class="progress-text">正在计算回测，请稍候...</div>
  </div>

  <!-- Error -->
  <div id="error-area"></div>

  <!-- Summary -->
  <div class="summary-card" id="summary-card">
    <div class="summary-inner">
      <h2>汇总对比</h2>
      <table>
        <thead>
          <tr>
            <th>交易对</th>
            <th>净收益率</th>
            <th>年化</th>
            <th>次数</th>
            <th>正 / 负</th>
          </tr>
        </thead>
        <tbody id="summary-body"></tbody>
      </table>
    </div>
  </div>

  <!-- Detail -->
  <div class="detail-card" id="detail-card">
    <div class="detail-inner">
      <h2>逐笔明细</h2>
      <div id="detail-content"></div>
    </div>
  </div>

  <script>
    const _bp = window.location.pathname.replace(/\/(backtest|maintenance).*$/, '');

    document.getElementById('backtest-form').addEventListener('submit', function(e) {
      e.preventDefault();

      var pairs = [];
      document.querySelectorAll('#pair-checks input[name="pair"]:checked').forEach(function(cb) {
        pairs.push(cb.value);
      });

      var start = document.getElementById('start').value;
      var end = document.getElementById('end').value;
      if (!start || !end) { alert('请选择回测日期范围'); return; }
      if (pairs.length === 0) { alert('请至少选择一个交易对'); return; }

      var btn = document.getElementById('btn-run');
      btn.disabled = true;
      btn.textContent = '计算中...';

      document.getElementById('progress').classList.add('active');
      document.getElementById('summary-card').classList.remove('active');
      document.getElementById('detail-card').classList.remove('active');
      document.getElementById('error-area').innerHTML = '';

      var payload = {
        pairs: pairs,
        start: start,
        end: end,
        capital: parseFloat(document.getElementById('capital').value) || 10000,
        leverage: parseFloat(document.getElementById('leverage').value) || 1,
        futures_fee: parseFloat(document.getElementById('futures_fee').value) || 0.0002,
        spot_fee: parseFloat(document.getElementById('spot_fee').value) || 0.001,
        slippage: parseFloat(document.getElementById('slippage').value) || 0,
        yield_asset: document.getElementById('yield_asset').value,
      };

      fetch(_bp + '/api/backtest/run', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload),
      }).then(function(r) { return r.json(); }).then(function(data) {
        document.getElementById('progress').classList.remove('active');
        btn.disabled = false;
        btn.textContent = '开始回测';

        if (data.error) {
          document.getElementById('error-area').innerHTML = '<div class="error-box">&#x274C; ' + data.error + '</div>';
          return;
        }

        renderResults(data.results);
      }).catch(function(err) {
        document.getElementById('progress').classList.remove('active');
        btn.disabled = false;
        btn.textContent = '开始回测';
        document.getElementById('error-area').innerHTML = '<div class="error-box">&#x274C; 请求失败: ' + err.message + '</div>';
      });
    });

    function fmt(n) {
      return n.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }

    function fmtPct(n) {
      return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
    }

    function pairDotClass(name) {
      if (name.indexOf('BTC') !== -1) return 'btc';
      return 'eth';
    }

    function renderResults(results) {
      var keys = Object.keys(results);
      if (keys.length === 0) {
        document.getElementById('error-area').innerHTML = '<div class="error-box">&#x274C; 没有可回测的数据</div>';
        return;
      }

      // Summary table
      var tbody = document.getElementById('summary-body');
      tbody.innerHTML = '';
      keys.forEach(function(k) {
        var r = results[k];
        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td><span class="pair-dot ' + pairDotClass(r._name) + '" style="display:inline-block;vertical-align:middle;margin-right:0.4rem;"></span>' + r._name + '</td>' +
          '<td class="' + (r.net_pct >= 0 ? 'td-green' : 'td-red') + '">' + fmtPct(r.net_pct) + '</td>' +
          '<td class="' + (r.annualized >= 0 ? 'td-green' : 'td-red') + '">' + fmtPct(r.annualized) + '</td>' +
          '<td>' + r.total_count + '</td>' +
          '<td>' + r.positive_count + ' / ' + r.negative_count + '</td>';
        tbody.appendChild(tr);
      });
      document.getElementById('summary-card').classList.add('active');

      // Detail
      var detailContent = document.getElementById('detail-content');
      detailContent.innerHTML = '';
      keys.forEach(function(k) {
        var r = results[k];
        var section = document.createElement('div');
        section.className = 'pair-section';

        var html = '<div class="pair-title"><span class="pair-dot ' + pairDotClass(r._name) + '"></span>' + r._name + '</div>';
        html += '<dl class="pair-stats">';
        html += '<dt>持有天数</dt><dd>' + r.days.toFixed(1) + ' 天</dd>';
        html += '<dt>现货投入</dt><dd>' + fmt(r.spot_cost) + ' USDT</dd>';
        html += '<dt>合约保证金</dt><dd>' + fmt(r.margin) + ' USDT</dd>';
        html += '<dt>合约仓位</dt><dd>' + fmt(r.initial_position) + ' USDT (' + r.leverage + 'x)</dd>';
        html += '<dt>资金费率收益</dt><dd class="' + (r.funding_profit >= 0 ? 'td-green' : 'td-red') + '">' + fmt(r.funding_profit) + ' USDT</dd>';
        if (r.yield_profit !== 0) {
          html += '<dt>' + r.yield_name + ' <span class="yield-tag">' + r.yield_name + '</span></dt><dd class="' + (r.yield_profit >= 0 ? 'td-green' : 'td-red') + '">' + fmt(r.yield_profit) + ' USDT</dd>';
        }
        html += '<dt>手续费</dt><dd class="td-red">' + fmt(r.fee_cost) + ' USDT</dd>';
        html += '<dt>滑点</dt><dd class="td-red">' + fmt(r.slippage_cost) + ' USDT</dd>';
        html += '<dt>净收益</dt><dd class="' + (r.net_profit >= 0 ? 'td-green' : 'td-red') + '">' + fmt(r.net_profit) + ' USDT (' + fmtPct(r.net_pct) + ')</dd>';
        html += '<dt>最大单笔收益</dt><dd class="td-green">' + fmt(r.max_profit) + ' USDT</dd>';
        html += '<dt>最大单笔亏损</dt><dd class="td-red">' + fmt(r.max_loss) + ' USDT</dd>';
        html += '</dl>';

        var tableId = 'detail-' + k;
        html += '<button class="toggle-btn" onclick="toggleDetail(\'' + tableId + '\', this)">展开明细</button>';
        html += '<table class="detail-table" id="' + tableId + '">';
        html += '<thead><tr><th>时间</th><th>费率</th><th>价格</th><th>费率收益</th><th>手续费</th><th>滑点</th><th>净收益</th><th>累计</th></tr></thead>';
        html += '<tbody>';
        r.detail.forEach(function(d) {
          html += '<tr>';
          html += '<td>' + d.time + '</td>';
          html += '<td>' + d.rate.toFixed(6) + '</td>';
          html += '<td>' + d.price.toFixed(2) + '</td>';
          html += '<td class="' + (d.funding_pnl >= 0 ? 'td-green' : 'td-red') + '">' + fmt(d.funding_pnl) + '</td>';
          html += '<td class="td-red">' + fmt(d.fee_pnl) + '</td>';
          html += '<td class="td-red">' + fmt(d.slippage_pnl) + '</td>';
          html += '<td class="' + (d.net_pnl >= 0 ? 'td-green' : 'td-red') + '">' + fmt(d.net_pnl) + '</td>';
          html += '<td class="' + (d.cumulative >= 0 ? 'td-green' : 'td-red') + '">' + fmt(d.cumulative) + '</td>';
          html += '</tr>';
        });
        html += '</tbody></table>';

        section.innerHTML = html;
        detailContent.appendChild(section);
      });
      document.getElementById('detail-card').classList.add('active');
    }

    function toggleDetail(id, btn) {
      var table = document.getElementById(id);
      if (table.classList.contains('active')) {
        table.classList.remove('active');
        btn.textContent = '展开明细';
      } else {
        table.classList.add('active');
        btn.textContent = '收起明细';
      }
    }

    // ---- PWA Service Worker ----
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('{{ url_for("static", filename="sw.js") }}')
          .catch(function() {});
      });
    }
  </script>
</body>
</html>
