<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>crypto Arbitrage — 资金费率套利回测</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #222633;
      --border: #2a2e3a;
      --text: #e4e4e7;
      --text-muted: #8b8fa3;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --green: #22c55e;
      --green-bg: rgba(34,197,94,0.1);
      --orange: #f59e0b;
      --orange-bg: rgba(245,158,11,0.1);
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Nav */
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem; border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .nav-brand {
      font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .nav-links { display: flex; gap: 0.5rem; }
    .nav-links a {
      color: var(--text-muted); text-decoration: none; padding: 0.5rem 1rem;
      border-radius: 8px; font-size: 0.9rem; transition: all 0.15s;
    }
    .nav-links a:hover { color: var(--text); background: var(--surface-hover); }
    .nav-links a.active { color: var(--accent); background: rgba(99,102,241,0.1); }

    /* Hero */
    .hero {
      text-align: center; padding: 4rem 1rem 2rem;
    }
    .hero h1 {
      font-size: 2.5rem; font-weight: 800; letter-spacing: -0.03em;
      margin-bottom: 0.75rem;
    }
    .hero h1 span {
      background: linear-gradient(135deg, #6366f1, #a78bfa, #c084fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hero p { color: var(--text-muted); font-size: 1.1rem; max-width: 560px; margin: 0 auto; line-height: 1.6; }

    /* Cards */
    .cards {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 1.5rem; max-width: 900px; margin: 2.5rem auto; padding: 0 1rem;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 2rem;
      transition: all 0.2s; text-decoration: none; color: inherit;
      display: block;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(99,102,241,0.15); }

    .card-icon {
      width: 48px; height: 48px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; margin-bottom: 1.25rem;
    }
    .card-icon.blue { background: rgba(99,102,241,0.15); }
    .card-icon.green { background: var(--green-bg); }

    .card h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.5rem; }
    .card p { color: var(--text-muted); font-size: 0.9rem; line-height: 1.5; }

    .card-tags { display: flex; gap: 0.4rem; margin-top: 1.25rem; flex-wrap: wrap; }
    .card-tag {
      font-size: 0.75rem; padding: 0.2rem 0.6rem; border-radius: 6px;
      background: var(--surface-hover); color: var(--text-muted);
    }

    /* Stats bar */
    .stats-bar {
      display: flex; justify-content: center; gap: 3rem;
      padding: 2rem 1rem; max-width: 700px; margin: 0 auto;
    }
    .stat-item { text-align: center; }
    .stat-value { font-size: 1.75rem; font-weight: 800; letter-spacing: -0.02em; }
    .stat-value.purple { color: var(--accent-hover); }
    .stat-value.green { color: var(--green); }
    .stat-label { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem; }

    /* Footer */
    .footer {
      text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.8rem;
      border-top: 1px solid var(--border); margin-top: 3rem;
    }
    .footer a {
      color: var(--accent-hover); text-decoration: none; transition: color 0.15s;
    }
    .footer a:hover { color: var(--accent); }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-brand">Arbitrage</div>
    <div class="nav-links">
      <a href="{{ url_for('index') }}" class="active">首页</a>
      <a href="{{ url_for('maintenance') }}">数据维护</a>
      <a href="{{ url_for('backtest') }}">回测</a>
    </div>
  </nav>

  <div class="hero">
    <h1><span>资金费率套利</span> 回测工具</h1>
    <p>基于币安合约历史资金费率数据，回测做空合约 + 做多现货的 Delta 中性套利策略</p>
  </div>

  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-value purple">4</div>
      <div class="stat-label">交易对</div>
    </div>
    <div class="stat-item">
      <div class="stat-value green">19,382</div>
      <div class="stat-label">历史数据</div>
    </div>
    <div class="stat-item">
      <div class="stat-value purple">8h</div>
      <div class="stat-label">结算周期</div>
    </div>
  </div>

  <div class="cards">
    <a class="card" href="{{ url_for('maintenance') }}">
      <div class="card-icon blue">&#x1F4C5;</div>
      <h2>数据维护</h2>
      <p>查看各交易对数据范围，执行增量更新。支持资金费率和 BFUSD 利率数据管理。</p>
      <div class="card-tags">
        <span class="card-tag">数据范围</span>
        <span class="card-tag">增量更新</span>
        <span class="card-tag">BFUSD</span>
      </div>
    </a>
    <a class="card" href="{{ url_for('backtest') }}">
      <div class="card-icon green">&#x1F4CA;</div>
      <h2>策略回测</h2>
      <p>配置杠杆、手续费、滑点等参数，回测多交易对套利策略收益，查看逐笔明细。</p>
      <div class="card-tags">
        <span class="card-tag">多交易对</span>
        <span class="card-tag">杠杆配置</span>
        <span class="card-tag">逐笔明细</span>
      </div>
    </a>
  </div>

  <div class="footer">
    crypto Arbitrage &middot; 币安资金费率套利回测工具 &middot; Python + SQLite &middot;
    <a href="https://github.com/denvor/crypto_arbitrage" target="_blank" rel="noopener">GitHub</a>
  </div>
</body>
</html>
